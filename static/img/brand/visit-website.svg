<svg xmlns="http://www.w3.org/2000/svg" width="440" height="76" viewBox="0 0 440 76" role="img" aria-label="Visit the FolioOrb website">
  <title>Visit the FolioOrb website</title>
  <defs>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6fd6f0"/>
      <stop offset="1" stop-color="#97acec"/>
    </linearGradient>
    <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12131b"/>
      <stop offset="1" stop-color="#0a0a10"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6fd6f0" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#6fd6f0" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#6fd6f0" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="round">
      <rect x="2" y="2" width="436" height="72" rx="16"/>
    </clipPath>
  </defs>

  <!-- Card -->
  <rect x="2" y="2" width="436" height="72" rx="16" fill="url(#fill)" stroke="url(#border)" stroke-width="1.5"/>

  <!-- Sweeping sheen -->
  <g clip-path="url(#round)">
    <rect x="-160" y="2" width="140" height="72" fill="url(#sheen)" transform="skewX(-18)">
      <animate attributeName="x" from="-180" to="460" dur="3.6s" begin="0.8s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Orbit mark -->
  <g transform="translate(42,38)">
    <circle r="16" fill="none" stroke="#6fd6f0" stroke-opacity="0.35" stroke-width="1.4"/>
    <circle r="5.5" fill="#6fd6f0">
      <animate attributeName="fill-opacity" values="0.7;1;0.7" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <g>
      <circle cx="16" cy="0" r="2.6" fill="#97acec"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- Text -->
  <text x="76" y="33" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="17" font-weight="700" fill="#f5f5f7">Explore the live website</text>
  <text x="76" y="52" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="12.5" fill="#9a9aa6">Real product demos · downloads · docs</text>

  <!-- Arrow -->
  <g transform="translate(404,38)" fill="none" stroke="#6fd6f0" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-6,0 H6 M1,-5 L6,0 L1,5">
      <animateTransform attributeName="transform" type="translate" values="0,0; 4,0; 0,0" dur="1.8s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
